apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yml
  - ../base

# Keep in sync with namespace.yml or else!!!
namespace: hello-flux

labels:
  - pairs:
      app: washere
      env: test
    includeSelectors: true

patches:
  - target: { kind: Ingress, name: washere }
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: washere.ct.gdcc.io