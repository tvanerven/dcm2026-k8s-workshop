apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yml
  - ../../base/whoami

# Keep in sync with namespace.yml or else!!!
namespace: hello-whoami

labels:
  - pairs:
      app: whoami
      env: test
    includeSelectors: true

patches:
  - target: { kind: Ingress, name: whoami }
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: whoami.ct.gdcc.io
