---
apiVersion: batch/v1
kind: Job
metadata:
  name: bootstrap
  labels:
    app.kubernetes.io/name: bootstrap
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bootstrap
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: OnFailure
      containers:
        - name: job
          image: _configbaker
          imagePullPolicy: Always
          env:
            - name: DATAVERSE_URL
              value: "http://dataverse:8080"
            - name: WAIT_TIMEOUT
              value: "5m"
            - name: API_UNBLOCK_KEY_FILE
              value: "apiUnblockKey"
          command:
            - "bash"
            - "-c"
            - |
              cd /scripts/bootstrap/base
              mkdir -p /tmp/bin
              cat > /tmp/bin/curl <<'WRAPPER_EOF'
              #!/bin/bash
              ARGS=()
              for arg in "$@"; do
                if [[ "$arg" == http://* ]] || [[ "$arg" == https://* ]]; then
                  if [[ "$arg" == *"?"* ]]; then
                    arg="${arg}&unblock-key=${API_UNBLOCK_KEY}"
                  else
                    arg="${arg}?unblock-key=${API_UNBLOCK_KEY}"
                  fi
                fi
                ARGS+=("$arg")
              done
              exec /usr/bin/curl "${ARGS[@]}"
              WRAPPER_EOF
              chmod +x /tmp/bin/curl
              export PATH="/tmp/bin:$PATH"
              export API_UNBLOCK_KEY=$(cat /run/secrets/${API_UNBLOCK_KEY_FILE})
              bootstrap.sh -u "${DATAVERSE_URL}" -t "${WAIT_TIMEOUT}" base
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "64Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"
              ephemeral-storage: "32Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ "ALL" ]
            readOnlyRootFilesystem: true
      volumes:
        - name: secrets
          secret:
            secretName: dataverse
        - name: tmp
          emptyDir: {}
